aid: targa-energy
name: Targa Energy
description: >-
  Targa Energy is a midstream natural gas and natural gas liquids (NGL) services
  company operating in North America. The company provides gathering, compression,
  treating, processing, and selling of natural gas; storing, fractionating, treating,
  transporting, and selling of NGLs. Targa Energy operates as part of the broader
  Targa Resources enterprise, which is a Fortune 500 midstream infrastructure company
  focused on the Permian Basin and other major production areas.
